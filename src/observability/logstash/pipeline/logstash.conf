input {
  # Receive JSON logs from services via pino-socket (TCP)
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # json_lines codec parses Pino JSON directly to root-level fields:
  #   level, time, pid, hostname, name, msg, reqId, req, res, responseTime, ...

  # Service name from Pino's 'name' field (e.g. "api-gateway")
  if [name] {
    mutate {
      rename => { "name" => "service_name" }
    }
  } else if [hostname] {
    mutate {
      add_field => { "service_name" => "%{hostname}" }
    }
  }

  # Use Pino's 'time' (epoch ms) as the event timestamp
  if [time] {
    date {
      match => [ "time", "UNIX_MS" ]
      target => "@timestamp"
    }
    mutate {
      remove_field => [ "time" ]
    }
  }

  # Map Pino numeric log level to severity string
  # Pino levels: 10=trace, 20=debug, 30=info, 40=warn, 50=error, 60=fatal
  if [level] {
    if [level] >= 50 {
      mutate { add_field => { "severity" => "error" } }
    } else if [level] >= 40 {
      mutate { add_field => { "severity" => "warn" } }
    } else if [level] >= 30 {
      mutate { add_field => { "severity" => "info" } }
    } else {
      mutate { add_field => { "severity" => "debug" } }
    }
  }

  # Override severity based on HTTP response status code
  # 5xx → error, 4xx → warn (takes precedence over Pino log level)
  if [res][statusCode] {
    if [res][statusCode] >= 500 {
      mutate { replace => { "severity" => "error" } }
    } else if [res][statusCode] >= 400 {
      mutate { replace => { "severity" => "warn" } }
    }
  }

  # Clean up internal/noisy fields
  mutate {
    remove_field => [ "hostname", "@version" ]
  }

  # Set index name based on service
  if [service_name] and [service_name] != "" {
    mutate {
      add_field => {
        "[@metadata][index_name]" => "logs-%{service_name}-%{+YYYY.MM.dd}"
      }
    }
  } else {
    mutate {
      add_field => {
        "[@metadata][index_name]" => "logs-unknown-%{+YYYY.MM.dd}"
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["${ELASTIC_HOSTS}"]
    user => "${ELASTIC_USER}"
    password => "${ELASTIC_PASSWORD}"
    ssl_certificate_authorities => ["/usr/share/logstash/certs/ca/ca.crt"]

    index => "%{[@metadata][index_name]}"
    action => "create"
  }

  # Debug output — enable with LOGSTASH_DEBUG=true in .env
  if "${LOGSTASH_DEBUG}" == "true" {
    stdout {
      codec => rubydebug
    }
  }
}
