events {
  worker_connections 1024;
}

http {
  # ── HTTPS entry point ──────────────────────────────────────────────────────
  server {
    listen 7140 ssl;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Raise limit for avatar uploads
    client_max_body_size 10M;

    # ── Colyseus HTTP matchmaking (REST calls, no WS upgrade headers) ─────────
    location /colyseus/matchmake {
      proxy_pass         http://game-server:2567/matchmake;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
    }

    # ── Colyseus game server (WebSocket room connections) ────────────────────
    location /colyseus/ {
      proxy_pass         http://game-server:2567/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ── Notification WebSocket ────────────────────────────────────────────────
    location /ws {
      proxy_pass         http://api-gateway:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # ── API gateway — REST calls ──────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://api-gateway:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
    }

    # ── API gateway — health checks ───────────────────────────────────────────
    location /health {
      proxy_pass         http://api-gateway:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host       $host;
    }

    # ── Frontend (React SPA) — everything else ────────────────────────────────
    location / {
      proxy_pass         http://frontend:5173;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }
  }
}
