services:

  # ─── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: src/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
      - JWT_PUBLIC_KEY_PATH=/app/keys/jwt_public.pem
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3002
      - SERVICES_FILE=/app/config/services.json
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5044
    labels:
      prometheus.scrape: "true"
      prometheus.port: "3000"
    depends_on:
      auth:
        condition: service_started
      user-management:
        condition: service_started
      chat:
        condition: service_started
      matchmaking:
        condition: service_started
      game-server:
        condition: service_started
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: src/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    depends_on:
      - api-gateway
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Auth ───────────────────────────────────────────────────────────────────
  auth:
    build:
      context: src/auth
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - HOST=0.0.0.0
      - NODE_ENV=production
      - DATABASE_URL=file:/data/auth.db
      - JWT_PRIVATE_KEY_PATH=/app/keys/jwt_private.pem
      - JWT_PUBLIC_KEY_PATH=/app/keys/jwt_public.pem
      - USER_MANAGEMENT_URL=http://user-management:3004
    labels:
      prometheus.scrape: "true"
      prometheus.port: "3003"
    volumes:
      - auth-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── User Management ────────────────────────────────────────────────────────
  user-management:
    build:
      context: src/user-management
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - HOST=0.0.0.0
      - NODE_ENV=production
      - DATABASE_URL=file:/data/user-management.db
      - AUTH_SERVICE_URL=http://auth:3003
    labels:
      prometheus.scrape: "true"
      prometheus.port: "3004"
    volumes:
      - user-management-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Matchmaking ────────────────────────────────────────────────────────────
  matchmaking:
    build:
      context: src/matchmaking
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - HOST=0.0.0.0
      - NODE_ENV=production
      - DATABASE_URL=file:/data/matchmaking.db
      - GAME_SERVER_URL=http://game-server:2567
      - CHAT_SERVICE_URL=http://chat:3006
      - USER_MANAGEMENT_URL=http://user-management:3004
    labels:
      prometheus.scrape: "true"
      prometheus.port: "3005"
    volumes:
      - matchmaking-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Chat ───────────────────────────────────────────────────────────────────
  chat:
    build:
      context: src/chat
      dockerfile: Dockerfile
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - HOST=0.0.0.0
      - NODE_ENV=production
      - DATABASE_URL=file:/data/chat.db
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3002
    labels:
      prometheus.scrape: "true"
      prometheus.port: "3006"
    volumes:
      - chat-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Game Server ─────────────────────────────────────────────────────────────
  game-server:
    build:
      context: src/game-server
      dockerfile: Dockerfile
    ports:
      - "2567:2567"
    environment:
      - PORT=2567
      - NODE_ENV=production
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

volumes:
  auth-data:
  user-management-data:
  matchmaking-data:
  chat-data:

networks:
  app-net:
    name: transcendence-app
    driver: bridge
