services:

  # ─── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    container_name: api-gateway
    build:
      context: src/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - docker/urls.env
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - SERVICES_FILE=/app/config/services.json
    depends_on:
      auth:
        condition: service_started
      user-management:
        condition: service_started
      chat:
        condition: service_started
      matchmaking:
        condition: service_started
      game-server:
        condition: service_started
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    container_name: frontend
    build:
      context: src/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Auth ───────────────────────────────────────────────────────────────────
  auth:
    container_name: auth
    build:
      context: src/auth
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    env_file:
      - docker/urls.env
    environment:
      - PORT=3003
      - HOST=0.0.0.0
      - DATABASE_URL=file:/data/auth.db
    volumes:
      - auth-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── User Management ────────────────────────────────────────────────────────
  user-management:
    container_name: user-management
    build:
      context: src/user-management
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    env_file:
      - docker/urls.env
    environment:
      - PORT=3004
      - HOST=0.0.0.0
      - DATABASE_URL=file:/data/user-management.db
    volumes:
      - user-management-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Matchmaking ────────────────────────────────────────────────────────────
  matchmaking:
    container_name: matchmaking
    build:
      context: src/matchmaking
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    env_file:
      - docker/urls.env
    environment:
      - PORT=3005
      - HOST=0.0.0.0
      - DATABASE_URL=file:/data/matchmaking.db
    volumes:
      - matchmaking-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Chat ───────────────────────────────────────────────────────────────────
  chat:
    container_name: chat
    build:
      context: src/chat
      dockerfile: Dockerfile
    ports:
      - "3006:3006"
    env_file:
      - docker/urls.env
    environment:
      - PORT=3006
      - HOST=0.0.0.0
      - DATABASE_URL=file:/data/chat.db
    volumes:
      - chat-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Game Server ─────────────────────────────────────────────────────────────
  game-server:
    container_name: game-server
    build:
      context: src/game-server
      dockerfile: Dockerfile
    ports:
      - "2567:2567"
    environment:
      - PORT=2567
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

volumes:
  auth-data:
  user-management-data:
  matchmaking-data:
  chat-data:

networks:
  app-net:
    driver: bridge
