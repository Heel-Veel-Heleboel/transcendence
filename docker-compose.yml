services:

  # ─── Nginx (TLS termination + reverse proxy) ────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api-gateway
      - frontend
      - game-server
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: src/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - docker/shared.env
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - SERVICES_FILE=/app/config/services.json
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5044
      # ALLOWED_ORIGINS: the browser origin must match exactly (scheme + host, no port for 443).
      # https://transcendence-avs is the hostname used for remote/prod play.
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,https://transcendence-avs
    labels:
      prometheus.scrape: "true"
      prometheus.port: "3000"
    depends_on:
      auth:
        condition: service_started
      user-management:
        condition: service_started
      chat:
        condition: service_started
      matchmaking:
        condition: service_started
      game-server:
        condition: service_started
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: src/frontend
      dockerfile: Dockerfile
      args:
        # Vite bakes these into the bundle at build time.
        # Pass HOST_IP when building for LAN play: HOST_IP=x.x.x.x docker compose up --build
        - VITE_API_URL=${VITE_API_URL:-https://localhost}
        - VITE_GAME_URL=${VITE_GAME_URL:-https://localhost/colyseus}
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Auth ───────────────────────────────────────────────────────────────────
  auth:
    build:
      context: src/auth
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    env_file:
      - docker/shared.env
    environment:
      - PORT=3003
      - HOST=0.0.0.0
      - DATABASE_URL=file:/data/auth.db
      - JWT_PRIVATE_KEY_PATH=/app/keys/jwt_private.pem
      - JWT_PUBLIC_KEY_PATH=/app/keys/jwt_public.pem
      - USER_MANAGEMENT_URL=http://user-management:3004
      - SERVICE_NAME=auth
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5044
      # Set to true when serving over HTTPS so browsers honour the Secure cookie flag.
      # 'make remote' and 'make prod-build' pass COOKIE_SECURE=true automatically.
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    labels:
      prometheus.scrape: "true"
      prometheus.port: "3003"
    volumes:
      - auth-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── User Management ────────────────────────────────────────────────────────
  user-management:
    build:
      context: src/user-management
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    env_file:
      - docker/shared.env
    environment:
      - PORT=3004
      - HOST=0.0.0.0
      - DATABASE_URL=file:/data/user-management.db
      - AUTH_SERVICE_URL=http://auth:3003
      - SERVICE_NAME=user-management
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5044
    labels:
      prometheus.scrape: "true"
      prometheus.port: "3004"
    volumes:
      - user-management-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Matchmaking ────────────────────────────────────────────────────────────
  matchmaking:
    build:
      context: src/matchmaking
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    env_file:
      - docker/shared.env
    environment:
      - PORT=3005
      - HOST=0.0.0.0
      - DATABASE_URL=file:/data/matchmaking.db
      - GAME_SERVER_URL=http://game-server:2567
      - CHAT_SERVICE_URL=http://chat:3006
      - USER_MANAGEMENT_URL=http://user-management:3004
      - SERVICE_NAME=matchmaking
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5044
    labels:
      prometheus.scrape: "true"
      prometheus.port: "3005"
    volumes:
      - matchmaking-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Chat ───────────────────────────────────────────────────────────────────
  chat:
    build:
      context: src/chat
      dockerfile: Dockerfile
    ports:
      - "3006:3006"
    env_file:
      - docker/shared.env
    environment:
      - PORT=3006
      - HOST=0.0.0.0
      - DATABASE_URL=file:/data/chat.db
      - ALLOWED_ORIGINS=http://localhost:5173,https://transcendence-avs
      - SERVICE_NAME=chat
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5044
    labels:
      prometheus.scrape: "true"
      prometheus.port: "3006"
    volumes:
      - chat-data:/data
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

  # ─── Game Server ─────────────────────────────────────────────────────────────
  game-server:
    build:
      context: src/game-server
      dockerfile: Dockerfile
    ports:
      - "2567:2567"
    environment:
      - PORT=2567
    networks:
      - app-net
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        window: 15s

volumes:
  auth-data:
  user-management-data:
  matchmaking-data:
  chat-data:

networks:
  app-net:
    name: transcendence-app
    driver: bridge
